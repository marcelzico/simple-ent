<!-- utilisateur/components/profile_picture.html -->
<div class="profile-picture-container">
    <div class="position-relative" style="width: 150px; height: 150px;">
        <!-- Current Profile Picture -->
        <img 
            id="currentProfilePic" 
            src="{{ profile_pic_url|default:'/static/images/default-avatar.png' }}" 
            alt="Photo de profil"
            class="profile-picture rounded-circle shadow"
            style="width: 100%; height: 100%; object-fit: cover; border: 3px solid white;"
        >
        
        <!-- Change Picture Icon -->
        <button 
            type="button" 
            class="btn btn-primary btn-sm rounded-circle position-absolute bottom-0 end-0"
            style="width: 40px; height: 40px;"
            data-bs-toggle="modal" 
            data-bs-target="#changeProfilePicModal"
            onclick="setProfileType('{{ profile_type }}')"
            title="Changer la photo"
        >
            <i class="bi bi-camera"></i>
        </button>
        
        <!-- Loading Indicator (hidden by default) -->
        <div id="uploadingSpinner" class="position-absolute top-50 start-50 translate-middle d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Chargement...</span>
            </div>
        </div>
    </div>
</div>
