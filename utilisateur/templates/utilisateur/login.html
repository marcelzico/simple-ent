<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MedZone</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #4e54c8;
            --gradient-start: #8f94fb;
            --gradient-end: #4e54c8;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }
        
        .auth-card {
            border-radius: 16px;
            border: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .auth-header {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .auth-logo {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .auth-tagline {
            opacity: 0.9;
            font-size: 1rem;
        }
        
        .auth-body {
            padding: 30px;
            background: white;
        }
        
        .form-control {
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #eef2f7;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(78, 84, 200, 0.15);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border: none;
            padding: 14px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 84, 200, 0.3);
        }
        
        .btn-outline-secondary {
            border: 2px solid #eef2f7;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }
        
        .divider-text {
            padding: 0 15px;
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .auth-wrapper {
                padding: 10px;
            }
            
            .auth-body {
                padding: 25px 20px;
            }
            
            .auth-header {
                padding: 25px 15px;
            }
            
            .auth-logo {
                font-size: 1.8rem;
            }
            
            .back-home {
                position: fixed;
                top: 15px;
                left: 15px;
            }
            
            .back-home .btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }
        
        @media (max-width: 576px) {
            .auth-body {
                padding: 20px 15px;
            }
            
            .btn-lg {
                padding: 12px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Bouton retour accueil -->
    <div class="back-home">
        <a href="/" class="btn btn-light btn-sm shadow-sm">
            <i class="bi bi-arrow-left me-1"></i>Accueil
        </a>
    </div>
    
    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                    <div class="auth-card">
                        <!-- Header -->
                        <div class="auth-header">
                            <h1 class="auth-logo">Medzone</h1>
                            <p class="auth-tagline">Plateforme éducative intelligente</p>
                        </div>
                        
                        <!-- Body -->
                        <div class="auth-body">
                            <div class="text-center mb-4">
                                <h2 class="fw-bold mb-2">Connexion</h2>
                                <p class="text-muted">Accédez à votre espace personnel</p>
                            </div>
                            
                            <form method="post" action="{% url 'utilisateur:login' %}">
                                {% csrf_token %}
                                
                                {% if next %}
                                <input type="hidden" name="next" value="{{ next }}">
                                {% endif %}
                                
                                <!-- Username/Email -->
                                <div class="mb-3">
                                    <label for="username" class="form-label fw-medium">
                                        <i class="bi bi-person me-1"></i>Nom d'utilisateur ou Email
                                    </label>
                                    <input type="text" 
                                           name="username" 
                                           id="username"
                                           class="form-control"
                                           value="{{ request.POST.username|default:'' }}"
                                           required
                                           autofocus>
                                </div>
                                
                                <!-- Password -->
                                <div class="mb-3">
                                    <label for="password" class="form-label fw-medium">
                                        <i class="bi bi-lock me-1"></i>Mot de passe
                                    </label>
                                    <div class="input-group">
                                        <input type="password" 
                                               name="password" 
                                               id="password"
                                               class="form-control"
                                               required>
                                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                    {% comment %} <div class="text-end mt-2">
                                        <a href="{% url 'utilisateur:password_reset' %}" class="text-decoration-none small">
                                            Mot de passe oublié ?
                                        </a>
                                    </div> {% endcomment %}
                                </div>
                                
                                <!-- Remember Me -->
                                <div class="mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="remember_me" id="remember_me">
                                        <label class="form-check-label" for="remember_me">
                                            Se souvenir de moi
                                        </label>
                                    </div>
                                </div>
                                
                                <!-- Submit Button -->
                                <div class="d-grid gap-2 mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                                    </button>
                                </div>
                                
                                {% comment %} <!-- Social Login -->
                                <div class="divider">
                                    <span class="divider-text">Ou connectez-vous avec</span>
                                </div>
                                
                                <div class="d-flex justify-content-center gap-3 mb-4">
                                    <button type="button" class="btn btn-outline-primary flex-fill">
                                        <i class="bi bi-google me-2"></i>Google
                                    </button>
                                    <button type="button" class="btn btn-outline-dark flex-fill">
                                        <i class="bi bi-facebook me-2"></i>Facebook
                                    </button>
                                </div> {% endcomment %}
                                
                                <!-- Register Link -->
                                <div class="text-center">
                                    <p class="mb-0">Pas encore de compte ? 
                                        <a href="{% url 'utilisateur:register' %}" class="text-decoration-none fw-bold">
                                            S'inscrire
                                        </a>
                                    </p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });
        
        // Auto-hide back button on scroll for mobile
        let lastScrollTop = 0;
        const backHome = document.querySelector('.back-home');
        
        window.addEventListener('scroll', function() {
            if (window.innerWidth <= 768) {
                let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                if (scrollTop > lastScrollTop) {
                    // Scrolling down
                    backHome.style.opacity = '0';
                    backHome.style.transform = 'translateY(-10px)';
                } else {
                    // Scrolling up
                    backHome.style.opacity = '1';
                    backHome.style.transform = 'translateY(0)';
                }
                lastScrollTop = scrollTop;
            }
        });
    </script>
</body>
</html>
