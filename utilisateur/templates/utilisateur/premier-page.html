<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedZone - Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .hero-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
        }
        .btn-mobile {
            padding: 12px 24px;
            font-size: 1.1rem;
            margin: 8px 0;
        }
        @media (max-width: 768px) {
            .display-2 {
                font-size: 2.5rem;
            }
            .hero-section {
                min-height: 70vh;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="row hero-section">
                <div class="col-12">
                    <h1 class="text-center display-2 text-danger mb-4">Bienvenue au MedZone</h1>
                    <p class="lead text-center mb-4">Choisissez une option pour continuer</p>
                    <div class="row justify-content-center">
                        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                            <a href="{% url 'utilisateur:register' %}" class="btn btn-primary btn-mobile w-100">S'inscrire</a>
                            <a href="{% url 'utilisateur:login' %}" class="btn btn-outline-primary btn-mobile w-100">Se connecter</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    {% include 'includes/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
