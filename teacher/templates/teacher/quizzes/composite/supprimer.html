<!-- teacher/templates/teacher/quizzes/composite/supprimer.html -->
{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">Confirmation</div>
            <div class="card-body text-center">
                <i class="fas fa-tasks fa-4x text-danger mb-3"></i>
                <h5>Supprimer "{{ quiz.title }}" ?</h5>
                <div class="alert alert-warning">Cette action est irréversible.</div>
                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'teacher:mcq_quiz_list' %}" class="btn btn-secondary">Annuler</a>
                    <button type="submit" class="btn btn-danger">Confirmer</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
