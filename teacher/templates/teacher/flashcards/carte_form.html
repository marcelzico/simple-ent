<!-- teacher/templates/teacher/flashcards/carte_form.html -->
{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">{{ title }}</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3"><label class="form-label fw-bold">Terme / Question</label>{{ form.term }}</div>
                    <div class="mb-3"><label class="form-label fw-bold">Définition / Réponse</label>{{ form.definition }}</div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'teacher:flashcard_cards' set.id %}" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-primary">{{ button_text }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
