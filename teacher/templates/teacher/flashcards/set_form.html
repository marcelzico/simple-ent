
<!-- teacher/templates/teacher/flashcards/set_form.html -->
{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">{{ title }}</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3"><label class="form-label fw-bold">{{ field.label }}</label>{{ field }}</div>
                    {% endfor %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'teacher:flashcard_sets' %}" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-primary">{{ button_text }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
