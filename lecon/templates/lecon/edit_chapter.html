{% extends 'base.html' %}

{% block title %}Modifier le chapitre{% endblock title %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3><i class="fas fa-edit me-2"></i>Modifier le chapitre</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col-12 mb-3">
                        <label class="form-label">Titre</label>
                        {{ form.title }}
                    </div>
                    <div class="col-12 col-md-6 mb-3">
                        <label class="form-label">Professeur</label>
                        {{ form.prof }}
                    </div>
                    <div class="col-12 col-md-6 mb-3">
                        <label class="form-label">Ordre</label>
                        {{ form.order }}
                    </div>
                    <div class="col-12 mb-3">
                        <div class="form-check">
                            {{ form.is_active }}
                            <label class="form-check-label" for="{{ form.is_active.id_for_label }}">
                                Chapitre actif
                            </label>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i>Modifier le chapitre
                    </button>
                    <a href="{% url 'lecon:chapter_detail' chapter.ue.id chapter.id %}" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i>Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
.form-control, .form-select {
    border-radius: 0.375rem;
    border: 1px solid #ced4da;
    padding: 0.5rem 0.75rem;
}

.form-control:focus, .form-select:focus {
    border-color: #86b7fe;
    box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
}

.form-check-input:checked {
    background-color: #0d6efd;
    border-color: #0d6efd;
}
</style>
{% endblock %}
