{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h3><i class="fas fa-plus me-2"></i>Créer un résumé pour {{ chapter.title }}</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="resume" class="form-label">Votre résumé personnel</label>
                    <textarea class="form-control" id="resume" name="resume" rows="15" 
                              placeholder="Écrivez votre résumé du chapitre ici... Vous pouvez inclure les points clés, les concepts importants, et vos propres réflexions."></textarea>
                    <div class="form-text">Ce résumé est personnel et ne sera visible que par vous.</div>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save me-1"></i>Créer le résumé
                    </button>
                    <a href="{% url 'lecon:chapter_detail' chapter.ue.id chapter.id %}" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i>Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
