{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-info text-white">
            <h3><i class="fas fa-robot me-2"></i>Créer un résumé IA pour {{ chapter.title }}</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="resume" class="form-label">Résumé généré par IA</label>
                    <textarea class="form-control" id="resume" name="resume" rows="15" 
                              placeholder="Collez ou écrivez le résumé généré par l'IA ici... Ce résumé sera visible par tous les étudiants."></textarea>
                    <div class="form-text">Ce résumé sera visible par tous les étudiants qui ont accès à ce chapitre.</div>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-info">
                        <i class="fas fa-save me-1"></i>Créer le résumé IA
                    </button>
                    <a href="{% url 'lecon:chapter_detail' chapter.ue.id chapter.id %}" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i>Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
