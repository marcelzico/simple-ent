{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-danger text-white">
            <h3><i class="fas fa-trash me-2"></i>Supprimer votre résumé</h3>
        </div>
        <div class="card-body">
            <div class="alert alert-warning">
                <h5><i class="fas fa-exclamation-triangle me-2"></i>Attention</h5>
                <p class="mb-0">Êtes-vous sûr de vouloir supprimer votre résumé pour le chapitre <strong>"{{ chapter.title }}"</strong> ?</p>
            </div>
            
            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h6 class="mb-0">Aperçu du résumé</h6>
                </div>
                <div class="card-body">
                    <p class="mb-0">{{ resume.resume|truncatewords:50 }}</p>
                </div>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash me-1"></i>Oui, supprimer définitivement
                    </button>
                    <a href="{% url 'lecon:chapter_detail' chapter.ue.id chapter.id %}" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i>Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
