{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-warning text-white">
            <h3><i class="fas fa-edit me-2"></i>Modifier le document</h3>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <p class="mb-1"><strong>Fichier actuel:</strong></p>
                <a href="{{ document.file.url }}" target="_blank" class="btn btn-outline-primary btn-sm">
                    <i class="fas fa-file me-1"></i>{{ document.file.name }}
                </a>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="file_type" class="form-label">Type de document</label>
                    <select class="form-select" id="file_type" name="file_type" required>
                        <option value="docx" {% if document.file_type == 'docx' %}selected{% endif %}>Document Word (.docx)</option>
                        <option value="pptx" {% if document.file_type == 'pptx' %}selected{% endif %}>PowerPoint (.pptx)</option>
                        <option value="pdf" {% if document.file_type == 'pdf' %}selected{% endif %}>PDF (.pdf)</option>
                    </select>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save me-1"></i>Modifier le document
                    </button>
                    <a href="{% url 'lecon:chapter_detail' document.chapter.ue.id document.chapter.id %}" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i>Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
