{% extends 'base.html' %}

{% block title %}Chapters dropdown{% endblock %}


{% block content %}
    <!-- templates/quizzes/questions_dropdown_list_options.html -->
    {% for question in questions %}
    <option value="{{ question.id }}">{{ question.question|truncatewords:10 }}</option>
    {% empty %}
    <option value="">No questions available for selected chapters</option>
    {% endfor %}
{% endblock content %}
