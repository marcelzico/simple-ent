{% extends 'base.html' %}

{% block title %}Quiz Result{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4>Quiz Result: {{ quiz.title }}</h4>
            </div>
            <div class="card-body text-center">
                <div class="mb-4">
                    <h2>Your Score: {{ score|floatformat:1 }}%</h2>
                    <p class="lead">You got {{ correct }} out of {{ total }} questions correct</p>
                </div>
                
                <div class="progress mb-4" style="height: 30px;">
                    <div class="progress-bar bg-success" role="progressbar" style="width: {{ score }}%" 
                         aria-valuenow="{{ score }}" aria-valuemin="0" aria-valuemax="100">
                        {{ score|floatformat:1 }}%
                    </div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="{% url 'lecon:subject_detail' quiz.subject.pk %}" class="btn btn-primary">
                        Back to Subject
                    </a>
                    <a href="{% url 'quizzes:mcq_quiz_results' %}" class="btn btn-outline-primary">
                        View All Results
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
