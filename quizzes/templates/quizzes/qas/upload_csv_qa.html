{% extends 'base.html' %}

{% block content %}
<h2>Téléverser un fichier de Questions et réponses (Q&A) en CSV pour {{chapter.title}}</h2>
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
{% endif %}

<form method="POST" enctype="multipart/form-data" action="{% url "quizzes:upload_csv_qa" chapter.id %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Téléverser</button>
    <a href="{% url "lecon:chapter_detail" chapter.ue.id chapter.id %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
