{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-danger text-white">
            <h4>Delete Q&A</h4>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete this Q&A?</p>
            <div class="alert alert-warning">
                <strong>Question:</strong> {{ qa.question|truncatechars:100 }}
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-between">
                    <a href="{% url 'quizzes:view_qas' qa.chapter.id %}" class="btn btn-secondary">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-danger">
                        Delete Q&A
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
